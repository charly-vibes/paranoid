#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.32.0"
hooks = [
    { id = "typos" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "shellcheck", name = "shellcheck", entry = "shellcheck", language = "system", types = ["shell"] },
]
