name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spelling
        uses: crate-ci/typos@v1.32.0

      - name: Shellcheck
        run: shellcheck build-metadata.sh

      - name: Build metadata
        run: |
          sudo apt-get install -y jq
          bash build-metadata.sh > apps-metadata.json
          cat apps-metadata.json
