name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs with version
        run: |
          cd android/app/build/outputs/apk/release
          for apk in app-*.apk; do
            abi=$(echo "$apk" | sed 's/app-//;s/-release.apk//')
            mv "$apk" "paranoid-${GITHUB_REF_NAME}-${abi}.apk"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/paranoid-*.apk
          generate_release_notes: true
